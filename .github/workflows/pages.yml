name: Build, Crawl, and Deploy Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      full_crawl:
        description: "Fetch CCF-A/arXiv rawdata, enrich abstracts, then process"
        type: boolean
        default: false
      process_rawdata:
        description: "Process existing data/rawdata before building"
        type: boolean
        default: true
      from_year:
        description: "Full crawl start year"
        type: string
        default: "2020"
      to_year:
        description: "Full crawl end year"
        type: string
        default: "2026"
  schedule:
    # 01:00 Asia/Shanghai every day.
    - cron: "0 17 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch full rawdata
        if: github.event_name == 'schedule' || inputs.full_crawl
        run: python scripts/fetch_rawdata.py --from-year "${{ inputs.from_year || '2020' }}" --to-year "${{ inputs.to_year || '2026' }}" --tracks AI,DB,SE --arxiv-max-results 1000 --sleep 0.5

      - name: Crawl supplemental metadata
        if: github.event_name == 'schedule' || inputs.full_crawl
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scripts/crawl_papers.py --output data/autocrawl/openalex.json --from-year "${{ inputs.from_year || '2020' }}" --to-year "${{ inputs.to_year || '2026' }}" --source supplemental --max-results 60 --sleep 0.5

      - name: Fetch official accepted papers
        if: github.event_name == 'schedule' || inputs.full_crawl
        run: python scripts/fetch_official_accepted.py --from-year "${{ inputs.from_year || '2020' }}" --to-year "${{ inputs.to_year || '2026' }}" --sleep 0.5

      - name: Enrich abstracts
        if: github.event_name == 'schedule' || inputs.full_crawl
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scripts/enrich_abstracts.py data/rawdata --delay 1.0

      - name: Process rawdata
        if: github.event_name == 'schedule' || inputs.process_rawdata || inputs.full_crawl
        run: python scripts/process_folder.py

      - name: Reconcile CCF-A venues
        if: github.event_name == 'schedule' || inputs.process_rawdata || inputs.full_crawl
        run: python scripts/reconcile_ccf_venues.py

      - name: Dedupe and prune irrelevant papers
        if: github.event_name == 'schedule' || inputs.process_rawdata || inputs.full_crawl
        run: python scripts/merge_labeldata.py --dedupe-only --prune-irrelevant

      - name: Validate dataset
        if: github.event_name == 'schedule' || inputs.process_rawdata || inputs.full_crawl
        run: python scripts/validate_dataset.py --mode balanced --baseline HEAD:data/labeldata/labeldata.json

      - name: Audit literature sample
        if: github.event_name == 'schedule' || inputs.process_rawdata || inputs.full_crawl
        run: python scripts/audit_literature_sample.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit refreshed data
        if: github.event_name == 'schedule' || inputs.process_rawdata || inputs.full_crawl
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rawdata data/autocrawl/openalex.json data/labeldata/labeldata.json data/venues.json data/reports web/index.html
          git diff --cached --quiet || git commit -m "Update crawled Text-to-SQL papers"
          git push

      - name: Publish web directory to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/text2sql-gh-pages
          git clone --depth 1 --branch gh-pages "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" /tmp/text2sql-gh-pages
          rsync -a --delete --exclude .git web/ /tmp/text2sql-gh-pages/
          touch /tmp/text2sql-gh-pages/.nojekyll
          cd /tmp/text2sql-gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Deploy site"
          git push origin gh-pages

      - name: Configure Pages
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        continue-on-error: true
