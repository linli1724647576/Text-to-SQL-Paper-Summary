<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Text-to-SQL Paper Summary</title>
<style>
* { box-sizing: border-box; }
:root {
  --bg: #f6f7f9;
  --panel: #ffffff;
  --line: #dfe4ea;
  --text: #162033;
  --muted: #64748b;
  --blue: #2563eb;
  --teal: #0f9f9a;
  --orange: #c9520a;
  --green: #0f8b63;
  --navy: #1f3a5f;
  --sidebar: 300px;
}
body {
  margin: 0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
  color: var(--text);
  background: var(--bg);
  line-height: 1.55;
}
a { color: inherit; }
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 0 22px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
}
.brand { font-size: 18px; font-weight: 750; white-space: nowrap; }
.brand span { color: var(--blue); }
.count { color: var(--muted); font-size: 13px; }
.layout { display: flex; min-height: calc(100vh - 64px); }
.sidebar {
  position: sticky;
  top: 64px;
  width: var(--sidebar);
  min-width: var(--sidebar);
  height: calc(100vh - 64px);
  overflow: auto;
  background: var(--panel);
  border-right: 1px solid var(--line);
  padding: 14px 12px 28px;
}
.main { flex: 1; min-width: 0; padding: 18px 24px 42px; }
.section-title {
  color: var(--muted);
  font-size: 11px;
  font-weight: 750;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin: 14px 8px 8px;
}
.clear {
  display: none;
  width: calc(100% - 12px);
  margin: 4px 6px 10px;
  border: 1px solid var(--line);
  background: #f8fafc;
  color: var(--muted);
  border-radius: 7px;
  padding: 7px;
  cursor: pointer;
}
.clear.show { display: block; }
.tree-parent, .tree-child {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  border-radius: 7px;
  cursor: pointer;
  user-select: none;
}
.tree-parent { padding: 7px 9px; font-weight: 680; font-size: 13px; }
.tree-child { padding: 5px 9px 5px 27px; color: #334155; font-size: 12.5px; }
.tree-parent:hover, .tree-child:hover { background: #f1f5f9; }
.tree-parent.active, .tree-child.active { background: #e8f0ff; color: #1749b7; }
.tree-count { color: var(--muted); font-weight: 520; font-size: 11px; }
.tree-children { display: none; }
.tree-children.open { display: block; }
.pipeline {
  display: grid;
  grid-template-columns: repeat(5, minmax(128px, 1fr));
  gap: 22px;
  align-items: stretch;
  margin-bottom: 16px;
}
.stage {
  position: relative;
  min-height: 114px;
  background: var(--panel);
  border: 2px solid var(--orange);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 12px 10px;
  cursor: pointer;
}
.stage:not(:last-child)::after {
  content: "";
  position: absolute;
  right: -22px;
  top: 50%;
  width: 22px;
  height: 3px;
  background: #111827;
}
.stage:not(:last-child)::before {
  content: "";
  position: absolute;
  right: -25px;
  top: calc(50% - 5px);
  width: 0;
  height: 0;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  border-left: 10px solid #111827;
}
.stage.active { background: #fff7ed; box-shadow: 0 0 0 3px rgba(201, 82, 10, .12); }
.stage-num { color: var(--blue); font-weight: 760; font-size: 13px; }
.stage:nth-child(2) .stage-num, .stage:nth-child(5) .stage-num { color: var(--teal); }
.stage-title { margin-top: 8px; font-weight: 800; font-size: 16px; line-height: 1.2; }
.stage-sub { margin-top: 7px; color: var(--muted); font-size: 12px; }
.toolbar {
  position: sticky;
  top: 64px;
  z-index: 8;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  background: var(--bg);
  padding: 10px 0 12px;
}
.search { flex: 1; min-width: 260px; }
input, select {
  width: 100%;
  height: 38px;
  border: 1px solid #cfd6df;
  border-radius: 8px;
  background: #fff;
  color: var(--text);
  font: inherit;
  font-size: 14px;
  padding: 0 11px;
}
select { width: 190px; }
input:focus, select:focus { outline: 3px solid rgba(37,99,235,.14); border-color: var(--blue); }
.status { display: flex; justify-content: space-between; gap: 10px; align-items: center; color: var(--muted); font-size: 13px; margin: 4px 0 12px; }
.filters { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
.tag, .pill, .stage-pill {
  display: inline-flex;
  align-items: center;
  border-radius: 5px;
  padding: 2px 7px;
  font-size: 11.5px;
  font-weight: 650;
}
.tag { background: #e8f0ff; color: #1749b7; }
.tag button { border: 0; background: transparent; color: inherit; cursor: pointer; margin-left: 4px; font-weight: 800; }
.papers { display: flex; flex-direction: column; gap: 9px; }
.paper {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 16px;
}
.paper:hover { border-color: #c8d1dc; box-shadow: 0 2px 8px rgba(15,23,42,.05); }
.paper-head { cursor: pointer; }
.paper-title { font-weight: 720; font-size: 15px; line-height: 1.38; }
.meta { margin-top: 7px; display: flex; flex-wrap: wrap; gap: 5px; }
.badge { background: #eef2f7; color: #475569; }
.year { background: #dbeafe; color: #1d4ed8; }
.pill { background: #e9f7f4; color: #08766f; cursor: pointer; }
.stage-pill { background: #fff1e7; color: #a54005; cursor: pointer; }
.abstract { display: none; margin-top: 11px; color: #475569; font-size: 13.5px; }
.paper.open .abstract { display: block; }
.authors { margin-top: 8px; color: var(--muted); font-size: 12.5px; }
.empty { display: none; text-align: center; padding: 54px 12px; color: var(--muted); }
.back {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 38px;
  height: 38px;
  border: 0;
  border-radius: 999px;
  background: var(--navy);
  color: white;
  cursor: pointer;
  display: none;
}
.back.show { display: block; }
@media (max-width: 980px) {
  .layout { display: block; }
  .sidebar { position: relative; top: 0; width: auto; height: auto; min-width: 0; border-right: 0; border-bottom: 1px solid var(--line); }
  .main { padding: 14px; }
  .pipeline { grid-template-columns: 1fr; gap: 8px; }
  .stage:not(:last-child)::before, .stage:not(:last-child)::after { display: none; }
  select { width: calc(50% - 5px); min-width: 150px; }
}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><span>Text-to-SQL</span> Paper Summary</div>
  <div class="count" id="topCount">0 papers</div>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="section-title">Research Topics</div>
    <button class="clear" id="clearTopics">Clear topic filters</button>
    <div id="topicTree"></div>
    <div class="section-title">Pipeline Stages</div>
    <button class="clear" id="clearStages">Clear pipeline filters</button>
    <div id="stageTree"></div>
  </aside>
  <main class="main">
    <div class="pipeline" id="pipeline"></div>
    <div class="toolbar">
      <div class="search"><input id="search" placeholder="Search by title, abstract, author, topic..." autocomplete="off"></div>
      <select id="year"><option value="">All Years</option></select>
      <select id="venue"><option value="">All Venues</option></select>
    </div>
    <div class="status">
      <div id="statusText"></div>
      <div class="filters" id="filterTags"></div>
    </div>
    <div class="papers" id="papers"></div>
    <div class="empty" id="empty">No papers match the current filters.</div>
  </main>
</div>
<button class="back" id="back" title="Back to top">^</button>
<script>
const PAPERS = [];
const TOPIC_TAXONOMY = {"Task Setting": ["Single-turn Text-to-SQL", "Multi-turn Text-to-SQL", "Cross-domain Text-to-SQL", "Enterprise / BI Text-to-SQL", "Conversational Data Analysis", "Text-to-DSL / Hybrid Query"], "Pre-training and Fine-tuning": ["Pre-training", "Supervised Fine-tuning", "Instruction Tuning", "Reinforcement Learning", "Small Models and Distillation"], "Prompting and ICL": ["Zero-shot / Few-shot ICL", "Prompt Engineering", "Chain-of-Thought Reasoning", "Self-consistency / Voting", "Example Selection"], "Grounding and Retrieval": ["Schema Linking", "Value Linking", "Schema / Content Retrieval", "Semantic Layer / Metadata", "Knowledge Graph / External Knowledge"], "Planning and Generation": ["Intermediate Representation", "Query Decomposition", "Join Path Planning", "Constrained Decoding", "Dialect Adaptation", "Neural-symbolic Parsing"], "Agentic Feedback and Repair": ["Agentic Workflow", "Tool Use and Execution Guidance", "Self-correction and Repair", "Verification and Guardrails", "Security and Access Control", "Human Feedback"], "Benchmarks and Evaluation": ["Benchmark", "Dataset Construction", "Synthetic Data Generation", "Evaluation Metric", "Robustness and Generalization", "Contamination / Data Leakage", "Industrial Evaluation"]};
const PIPELINE_TAXONOMY = {"Task Understanding": ["Intent Detection", "Question Decomposition", "Dialogue Context Tracking", "Domain Constraint Understanding"], "Grounding": ["Schema Linking", "Value Linking", "Context Retrieval", "Database Content Grounding"], "Query Planning": ["SQL Sketch / Skeleton", "Intermediate Representation", "Join Path Planning", "Step-by-step Reasoning"], "SQL Generation": ["Prompt-based Generation", "Fine-tuned Generation", "Constrained Decoding", "Dialect Adaptation"], "Verification & Repair": ["Execution Feedback", "Self-correction", "Static SQL Validation", "Result Validation"]};
const TOPIC_COUNTS = {};
const STAGE_COUNTS = {};
const TOTAL = 0;

const activeTopics = new Set();
const activeStages = new Set();
let query = "";
let activeYear = "";
let activeVenue = "";
let filtered = PAPERS.slice();

const stageOrder = Object.keys(PIPELINE_TAXONOMY);
const byId = id => document.getElementById(id);
const escapeHtml = value => String(value || "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));

function renderPipeline() {
  byId("pipeline").innerHTML = stageOrder.map((stage, i) => `
    <button class="stage ${activeStages.has(stage) ? "active" : ""}" data-stage="${escapeHtml(stage)}">
      <div class="stage-num">Stage ${i + 1}</div>
      <div class="stage-title">${escapeHtml(stage)}</div>
      <div class="stage-sub">${escapeHtml((PIPELINE_TAXONOMY[stage] || []).slice(0, 3).join(" / "))}</div>
    </button>
  `).join("");
}

function renderTree(targetId, taxonomy, counts, activeSet, type) {
  const html = Object.entries(taxonomy).map(([parent, children]) => `
    <div class="tree-block">
      <div class="tree-parent ${activeSet.has(parent) ? "active" : ""}" data-type="${type}" data-label="${escapeHtml(parent)}">
        <span>${escapeHtml(parent)}</span><span class="tree-count">${counts[parent] || 0}</span>
      </div>
      <div class="tree-children open">
        ${children.map(child => counts[child] ? `
          <div class="tree-child ${activeSet.has(child) ? "active" : ""}" data-type="${type}" data-label="${escapeHtml(child)}">
            <span>${escapeHtml(child)}</span><span class="tree-count">${counts[child]}</span>
          </div>` : "").join("")}
      </div>
    </div>
  `).join("");
  byId(targetId).innerHTML = html;
}

function syncSidebar() {
  renderTree("topicTree", TOPIC_TAXONOMY, TOPIC_COUNTS, activeTopics, "topic");
  renderTree("stageTree", PIPELINE_TAXONOMY, STAGE_COUNTS, activeStages, "stage");
  byId("clearTopics").classList.toggle("show", activeTopics.size > 0);
  byId("clearStages").classList.toggle("show", activeStages.size > 0);
  renderPipeline();
}

function toggle(set, label) {
  if (set.has(label)) set.delete(label);
  else set.add(label);
}

document.addEventListener("click", event => {
  const tree = event.target.closest(".tree-parent,.tree-child");
  if (tree) {
    toggle(tree.dataset.type === "topic" ? activeTopics : activeStages, tree.dataset.label);
    applyFilters();
    return;
  }
  const stage = event.target.closest(".stage");
  if (stage) {
    toggle(activeStages, stage.dataset.stage);
    applyFilters();
    return;
  }
  const pill = event.target.closest("[data-pill]");
  if (pill) {
    toggle(pill.dataset.kind === "topic" ? activeTopics : activeStages, pill.dataset.pill);
    applyFilters();
  }
});

byId("clearTopics").onclick = () => { activeTopics.clear(); applyFilters(); };
byId("clearStages").onclick = () => { activeStages.clear(); applyFilters(); };
byId("search").oninput = event => { query = event.target.value.trim().toLowerCase(); applyFilters(); };
byId("year").onchange = event => { activeYear = event.target.value; applyFilters(); };
byId("venue").onchange = event => { activeVenue = event.target.value; applyFilters(); };

function matches(paper) {
  const text = [paper.t, paper.a, paper.au, paper.v, paper.l.join(" "), paper.s.join(" ")].join(" ").toLowerCase();
  if (query && !text.includes(query)) return false;
  if (activeYear && paper.y !== activeYear) return false;
  if (activeVenue && paper.vb !== activeVenue) return false;
  if ([...activeTopics].some(label => !paper.l.includes(label))) return false;
  if ([...activeStages].some(label => !paper.s.includes(label))) return false;
  return true;
}

function tag(label, kind) {
  return `<span class="tag">${escapeHtml(label)} <button data-remove="${escapeHtml(label)}" data-kind="${kind}">x</button></span>`;
}

function renderTags() {
  const tags = [];
  if (activeYear) tags.push(tag("Year: " + activeYear, "year"));
  if (activeVenue) tags.push(tag("Venue: " + activeVenue, "venue"));
  activeTopics.forEach(label => tags.push(tag(label, "topic")));
  activeStages.forEach(label => tags.push(tag(label, "stage")));
  if (query) tags.push(tag('"' + query + '"', "query"));
  byId("filterTags").innerHTML = tags.join("");
}

byId("filterTags").onclick = event => {
  const button = event.target.closest("button");
  if (!button) return;
  const kind = button.dataset.kind;
  const value = button.dataset.remove;
  if (kind === "topic") activeTopics.delete(value);
  if (kind === "stage") activeStages.delete(value);
  if (kind === "year") { activeYear = ""; byId("year").value = ""; }
  if (kind === "venue") { activeVenue = ""; byId("venue").value = ""; }
  if (kind === "query") { query = ""; byId("search").value = ""; }
  applyFilters();
};

function paperCard(paper) {
  const linkTitle = paper.u ? `<a href="${escapeHtml(paper.u)}" target="_blank" rel="noopener">${escapeHtml(paper.t)}</a>` : escapeHtml(paper.t);
  const topics = paper.l.map(label => `<span class="pill" data-kind="topic" data-pill="${escapeHtml(label)}">${escapeHtml(label)}</span>`).join("");
  const stages = paper.s.map(label => `<span class="stage-pill" data-kind="stage" data-pill="${escapeHtml(label)}">${escapeHtml(label)}</span>`).join("");
  return `<article class="paper">
    <div class="paper-head">
      <div class="paper-title">${linkTitle}</div>
      <div class="meta">
        <span class="tag badge">${escapeHtml(paper.v || "Unknown")}</span>
        <span class="tag year">${escapeHtml(paper.y || "Unknown")}</span>
        ${topics}${stages}
      </div>
      ${paper.au ? `<div class="authors">${escapeHtml(paper.au)}</div>` : ""}
    </div>
    <div class="abstract">${escapeHtml(paper.a || "No abstract available.")}</div>
  </article>`;
}

function renderPapers() {
  byId("papers").innerHTML = filtered.map(paperCard).join("");
  byId("empty").style.display = filtered.length ? "none" : "block";
  document.querySelectorAll(".paper-head").forEach(head => {
    head.addEventListener("click", event => {
      if (event.target.closest("a,[data-pill]")) return;
      head.closest(".paper").classList.toggle("open");
    });
  });
}

function applyFilters() {
  filtered = PAPERS.filter(matches);
  byId("statusText").textContent = `Showing ${filtered.length} of ${TOTAL} papers`;
  byId("topCount").textContent = `${TOTAL} papers`;
  syncSidebar();
  renderTags();
  renderPapers();
}

const back = byId("back");
window.addEventListener("scroll", () => back.classList.toggle("show", window.scrollY > 420));
back.onclick = () => window.scrollTo({ top: 0, behavior: "smooth" });

applyFilters();
</script>
</body>
</html>
